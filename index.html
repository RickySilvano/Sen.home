/* ─────────────────────────────────────────

───────────────────────────────────────── */
const MapView = ({ apts, onSelect }) => {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    mapRef.current = L.map(containerRef.current, {zoomControl:true}).setView([14.720,-17.490],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapRef.current);
    return () => { if (mapRef.current){mapRef.current.remove();mapRef.current=null;} };
  }, []);
  useEffect(() => {
    if (!mapRef.current) return;
    markersRef.current.forEach(m=>m.remove()); markersRef.current=[];
    apts.forEach(apt => {
      if (!apt.lat) return;
      const icon = L.divIcon({html:`<div class="map-pin ${apt.available?'':'loue'}">${Math.round(apt.price/1000)}k</div>`,className:'',iconAnchor:[28,18]});
      const m = L.marker([apt.lat,apt.lng],{icon}).addTo(mapRef.current);
      m.on('click',()=>setPopup(apt));
      markersRef.current.push(m);
    });
  }, [apts]);
  return (
    <div className="relative rounded-2xl overflow-hidden shadow-md" style={{height:'540px'}}>
      <div ref={containerRef} style={{height:'100%',width:'100%'}}></div>
      <div className="absolute top-3 left-3 z-50 bg-white rounded-xl px-3 py-2 shadow-md flex items-center gap-3 text-xs">
        <span className="flex items-center gap-1.5"><span style={{background:'#1E3A5F',borderRadius:'20px',padding:'2px 8px',color:'white',fontWeight:700}}>350k</span>Disponible</span>
        <span className="flex items-center gap-1.5"><span style={{background:'#9CA3AF',borderRadius:'20px',padding:'2px 8px',color:'white',fontWeight:700}}>850k</span>Loué</span>
      </div>
      {popup && (
        <div className="absolute bottom-4 right-4 z-50 bg-white rounded-2xl shadow-xl overflow-hidden fade-in" style={{width:'230px'}}>
          <div className="relative">
            <img src={popup.images[0]} alt={popup.title} style={{width:'100%',height:'110px',objectFit:'cover'}}/>
            <button onClick={()=>setPopup(null)} className="absolute top-2 right-2 bg-white/90 hover:bg-white rounded-full w-6 h-6 flex items-center justify-center shadow"><I n="close" s={13}/></button>
            <span className={`absolute bottom-2 left-2 badge text-white text-xs ${popup.available?'bg-emerald-500':'bg-red-400'}`}>{popup.available?'● Disponible':'● Loué'}</span>
          </div>
          <div className="p-3">
            <p className="font-semibold text-gray-800 text-sm leading-snug">{popup.title}</p>
            <p className="text-xs text-gray-400 mt-0.5 flex items-center gap-1"><I n="location" s={11}/>{popup.zone}</p>
            <p className="font-bold mt-1 text-sm" style={{color:'#1E3A5F'}}>{fmt(popup.price)}<span className="text-gray-400 font-normal text-xs">/mois</span></p>
            <div className="flex gap-2 mt-2.5">
              <button onClick={()=>setPopup(null)} className="flex-1 border border-gray-200 text-gray-400 text-xs py-1.5 rounded-lg">Fermer</button>
              <button onClick={()=>onSelect(popup)} className="btn-gold flex-1 text-xs py-1.5 rounded-lg">Voir →</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  const [page, setPage] = useState('home');
  const [apt, setApt] = useState(null);
  const [apartments, setApartments] = useState([]);
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dbLive, setDbLive] = useState(false);

  /* ── Load apartments from Supabase ── */
  const loadApartments = async () => {
    try {
      const { data, error } = await sb
        .from('apartments')
        .select(`*, zones(name), apartment_images(url, display_order), apartment_amenities(amenity)`)
        .order('featured', { ascending: false })
        .order('views',    { ascending: false });
      if (error) throw error;
      if (data && data.length > 0) {
        setApartments(data.map(transformApt));
        setDbLive(true);
      } else {
        // Table exists but empty → use static demo
        setApartments(STATIC_APTS);
        setDbLive(false);
      }
    } catch (e) {
      console.warn('Supabase error, using static data:', e.message);
      setApartments(STATIC_APTS);
      setDbLive(false);
    }
  };

  /* ── Load requests from Supabase ── */
  const loadRequests = async () => {
    try {
      const { data, error } = await sb
        .from('visit_requests')
        .select(`*, apartments(title)`)
        .order('created_at', { ascending: false });
      if (!error && data && data.length > 0) {
        setRequests(data.map(transformReq));
      } else if (!error && data && data.length === 0) {
        setRequests(STATIC_REQUESTS);
      }
    } catch {
      setRequests(STATIC_REQUESTS);
    }
  };

  useEffect(() => {
    Promise.all([loadApartments(), loadRequests()]).finally(() => setLoading(false));
  }, []);

  /* ── Add request (local + Supabase via PropertyPage) ── */
  const addRequest = (req) => setRequests(prev => [req, ...prev]);

  /* ── Update request status ── */
  const updateStatus = async (id, status) => {
    setRequests(prev => prev.map(r => r.id===id ? {...r,status} : r));
    try { await sb.from('visit_requests').update({status}).eq('id', id); } catch {}
  };

  const go = (p) => {
    setPage(p);
    if (!p.startsWith('admin')) window.scrollTo({top:0,behavior:'smooth'});
  };

  /* ── Loading screen ── */
  if (loading) return (
    <div style={{minHeight:'100vh',background:'#0A1628',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div className="font-display text-4xl font-bold mb-2" style={{color:'#C9A84C'}}>Sen.home</div>
        <p style={{color:'rgba(255,255,255,0.35)',fontSize:'14px'}}>Chargement en cours...</p>
        <div className="spinner"></div>
      </div>
    </div>
  );

  const renderPage = () => {
    switch(page) {
      case 'home':             return <HomePage go={go} pick={setApt} apartments={apartments}/>;
      case 'properties':       return <PropertiesPage go={go} pick={setApt} apartments={apartments}/>;
      case 'property':         return <PropertyPage apt={apt} go={go} addRequest={addRequest}/>;
      case 'admin-login':      return <AdminLogin go={go}/>;
      case 'admin-dashboard':  return <AdminDashboard go={go} requests={requests} apartments={apartments} dbLive={dbLive} loadRequests={loadRequests}/>;
      case 'admin-properties': return <AdminProperties apartments={apartments} setApartments={setApartments}/>;
      case 'admin-requests':   return <AdminRequests requests={requests} updateStatus={updateStatus} loadRequests={loadRequests}/>;
      default:                 return <HomePage go={go} pick={setApt} apartments={apartments}/>;
    }
  };

  return (
    <div>
      {page !== 'admin-login' && <Navbar page={page} go={go} dbLive={dbLive}/>}
      <div key={page} className="fade-in">{renderPage()}</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
