/* ─────────────────────────────────────────
   MAP VIEW
───────────────────────────────────────── */
const MapView = ({ apts, onSelect }) => {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    mapRef.current = L.map(containerRef.current, {zoomControl:true}).setView([14.720,-17.490],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapRef.current);
    return () => { if (mapRef.current){mapRef.current.remove();mapRef.current=null;} };
  }, []);
  useEffect(() => {
    if (!mapRef.current) return;
    markersRef.current.forEach(m=>m.remove()); markersRef.current=[];
    const FALLBACK_COORDS=[[14.7517,-17.5263],[14.6978,-17.4566],[14.7497,-17.5099],[14.7078,-17.4868],[14.7271,-17.4607],[14.7449,-17.5100],[14.6980,-17.4547]];
    apts.forEach((apt,idx) => {
      const mlat = apt.lat || FALLBACK_COORDS[idx % FALLBACK_COORDS.length][0];
      const mlng = apt.lng || FALLBACK_COORDS[idx % FALLBACK_COORDS.length][1];
      const icon = L.divIcon({html:`<div class="map-pin ${apt.available?'':'loue'}">${Math.round(apt.price/1000)}k</div>`,className:'',iconAnchor:[28,18]});
      const m = L.marker([mlat,mlng],{icon}).addTo(mapRef.current);
      m.on('click',()=>setPopup(apt));
      markersRef.current.push(m);
    });
  }, [apts]);
  return (
    <div className="relative rounded-2xl overflow-hidden shadow-md" style={{height:'540px'}}>
      <div ref={containerRef} style={{height:'100%',width:'100%'}}></div>
      <div className="absolute top-3 left-3 z-50 bg-white rounded-xl px-3 py-2 shadow-md flex items-center gap-3 text-xs">
        <span className="flex items-center gap-1.5"><span style={{background:'#C9A84C',borderRadius:'20px',padding:'2px 8px',color:'white',fontWeight:700}}>350k</span>Disponible</span>
        <span className="flex items-center gap-1.5"><span style={{background:'#9CA3AF',borderRadius:'20px',padding:'2px 8px',color:'white',fontWeight:700}}>850k</span>Loué</span>
      </div>
      {popup && (
        <div className="absolute bottom-4 right-4 bg-white rounded-2xl shadow-xl overflow-hidden fade-in" style={{width:'230px',zIndex:2000}}>
          <div className="relative">
            <img src={popup.images[0]} alt={popup.title} style={{width:'100%',height:'110px',objectFit:'cover'}}/>
            <button onClick={()=>setPopup(null)} className="absolute top-2 right-2 bg-white/90 hover:bg-white rounded-full w-6 h-6 flex items-center justify-center shadow"><I n="close" s={13}/></button>
            <span className={`absolute bottom-2 left-2 badge text-white text-xs ${popup.available?'bg-emerald-500':'bg-red-400'}`}>{popup.available?'● Disponible':'● Loué'}</span>
          </div>
          <div className="p-3">
            <p className="font-semibold text-gray-800 text-sm leading-snug">{popup.title}</p>
            <p className="text-xs text-gray-400 mt-0.5 flex items-center gap-1"><I n="location" s={11}/>{popup.zone}</p>
            <p className="font-bold mt-1 text-sm" style={{color:'#1E3A5F'}}>{fmt(popup.price)}<span className="text-gray-400 font-normal text-xs">/mois</span></p>
            <div className="flex gap-2 mt-2.5">
              <button onClick={()=>setPopup(null)} className="flex-1 border border-gray-200 text-gray-400 text-xs py-1.5 rounded-lg">Fermer</button>
              <button onClick={()=>onSelect(popup)} className="btn-gold flex-1 text-xs py-1.5 rounded-lg">Voir →</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

          <p className="text-xs font-semibold tracking-widest uppercase mb-4" style={{color:'#C9A84C'}}>Votre Agence Immobilière Premium à Dakar</p>
          <h1 className="font-display text-5xl md:text-6xl text-white font-bold mb-4 leading-tight">Trouvez votre<br/>appartement idéal</h1>
          <p className="text-white/60 text-lg mb-10">Des biens d'exception dans les meilleurs quartiers de Dakar</p>
          <div className="bg-white rounded-2xl p-4 shadow-2xl max-w-2xl mx-auto">
            <div className="flex flex-col md:flex-row gap-3 items-end">
              <div className="flex-1">
                <label className="text-xs text-gray-400 font-medium block mb-1 text-left">Zone géographique</label>
                <select className="w-full text-gray-700 text-sm bg-transparent outline-none">
                  {ZONES.map(z=><option key={z}>{z}</option>)}
                </select>
              </div>
              <div className="hidden md:block w-px h-8 bg-gray-200 self-center"></div>
              <div className="flex-1">
                <label className="text-xs text-gray-400 font-medium block mb-1 text-left">Budget mensuel</label>
                <select className="w-full text-gray-700 text-sm bg-transparent outline-none">
                  {BUDGETS.map(b=><option key={b.label}>{b.label}</option>)}
                </select>
              </div>
              <button onClick={()=>go('properties')} className="btn-gold flex items-center gap-2 whitespace-nowrap"><I n="search" s={15}/>Rechercher</button>
            </div>
          </div>
          <div className="flex items-center justify-center gap-10 mt-10">
            {[[apartments.length+'+','Biens disponibles'],['12','Quartiers couverts'],['200+','Clients satisfaits']].map(([v,l],i)=>(
              <div key={i} className="text-center"><div className="font-display text-2xl font-bold text-white">{v}</div><div className="text-white/40 text-xs">{l}</div></div>
            ))}
          </div>
        </div>
        <div className="absolute bottom-8 left-1/2 -translate-x-1/2 text-white/30 animate-bounce"><I n="down" s={28}/></div>
      </div>

      <div className="max-w-6xl mx-auto px-4 py-16">
        <div className="flex items-center justify-between mb-8">
          <div>
            <p className="text-xs font-semibold tracking-widest uppercase mb-1" style={{color:'#C9A84C'}}>Sélection</p>
            <h2 className="font-display text-3xl text-gray-800">Biens en vedette</h2>
          </div>
          <button onClick={()=>go('properties')} className="flex items-center gap-2 text-sm border rounded-full px-5 py-2 font-medium transition-colors hover:bg-blue-50" style={{color:'#1E3A5F',borderColor:'#C9A84C'}}>
            Voir tout <I n="right" s={14}/>
          </button>
        </div>
        {featured.length > 0
          ? <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{featured.map(a=><AptCard key={a.id} apt={a} onClick={apt=>{pick(apt);go('property');}}/>)}</div>
          : <div className="text-center py-16 text-gray-400"><I n="building" s={40} c="mx-auto mb-3"/><p>Ajoutez vos premiers biens dans Supabase</p></div>
        }
      </div>

      <div style={{background:'#0A1628'}} className="py-16">
        <div className="max-w-6xl mx-auto px-4">
          <div className="text-center mb-10">
            <p className="text-xs font-semibold tracking-widest uppercase mb-2" style={{color:'#C9A84C'}}>Quartiers</p>
            <h2 className="font-display text-3xl text-white">Explorez par zone</h2>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">

                <I n="location" s={18} c="mx-auto mb-2 text-white/30 group-hover:text-yellow-400 transition-colors"/>

          </div>

const PropertyPage = ({ apt, go, addRequest }) => {
  const [imgIdx, setImgIdx] = useState(0);
  const [showTour, setShowTour] = useState(false);
  const [done, setDone] = useState(false);
  const [sending, setSending] = useState(false);
  const [form, setForm] = useState({name:'',phone:'',budget:'',date:'',profession:''});

  useEffect(()=>{setImgIdx(0);setShowTour(false);setDone(false);setSending(false);},[apt]);
  if (!apt) return null;

  const submit = async (e) => {
    e.preventDefault();
    setSending(true);
    const req = { apt_id: apt.id, apt_title: apt.title, ...form, id: Date.now(), status:'new', created: new Date().toISOString().slice(0,10) };
    try {
      const { error } = await sb.from('visit_requests').insert({
        apartment_id: apt.id,
        full_name: form.name,
        phone: form.phone,
        budget_label: form.budget,
        visit_date: form.date || null,
        profession: form.profession,
      });
      if (error) console.warn('Supabase insert error:', error.message);
    } catch(err) {
      console.warn('Could not save to Supabase, local only');
    }
    addRequest(req);
    setDone(true);
    setSending(false);
  };

  return (
    <div className="min-h-screen pt-16 fade-in" style={{background:'#F8F6F0'}}>

                <button onClick={()=>setImgIdx((imgIdx+1)%apt.images.length)} className="absolute right-3 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-md"><I n="right" s={16}/></button>

              <div className="absolute bottom-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded-full">{imgIdx+1}/{apt.images.length}</div>

            <div className="flex gap-2 mb-6 overflow-x-auto pb-1">

                  <div className="flex flex-col items-end gap-1">
                    <a href={`tel:${r.phone}`} className="btn-primary text-xs px-2.5 py-1 rounded-lg flex items-center gap-1"><I n="phone" s={11}/>Appeler</a>
                    <span className={`badge text-xs ${r.status==='new'?'bg-yellow-100 text-yellow-700':r.status==='contacted'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}`}>
                      {r.status==='new'?'Nouveau':r.status==='contacted'?'Contacté':'Visité'}
                    </span>
                  </div>
                </div>
              ))}
              {requests.length===0 && <p className="text-gray-400 text-sm text-center py-4">Aucune demande pour l'instant</p>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   ADMIN PROPERTIES
───────────────────────────────────────── */
const AdminProperties = ({ apartments, setApartments }) => {
  const toggle = async (id, current) => {
    const newVal = !current;
    setApartments(prev => prev.map(a=>a.id===id?{...a,available:newVal}:a));
    try { await sb.from('apartments').update({available:newVal}).eq('id',id); } catch {}
  };
  return (
    <div style={{background:'#F0F4F8'}} className="min-h-screen">
      <div className="max-w-6xl mx-auto px-4 py-8">
        <div className="flex items-center justify-between mb-6">
          <h1 className="font-display text-2xl text-gray-800">Gestion des Biens</h1>
          <a href="https://supabase.com/dashboard/project/usnfmbnfailkhnpsmnqg/editor" target="_blank"
            className="btn-gold flex items-center gap-2 text-sm"><I n="plus" s={15}/>Ajouter (Supabase)</a>
        </div>
        <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr style={{background:'#F8F8F6'}} className="text-left">
                  {['Bien','Zone','Prix/mois','Vues','Statut','Actions'].map(h=>(
                    <th key={h} className="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {apartments.map(a=>(
                  <tr key={a.id} className="hover:bg-gray-50 transition-colors">
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-3">
                        <img src={a.images[0]||'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=80&q=60'} alt="" className="w-12 h-9 object-cover rounded-lg"/>
                        <div><div className="font-medium text-gray-800">{a.title}</div><div className="text-xs text-gray-400">{a.type} · {a.surface}m²</div></div>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-gray-500">{a.zone}</td>
                    <td className="px-4 py-3 font-semibold" style={{color:'#1E3A5F'}}>{fmt(a.price)}</td>
                    <td className="px-4 py-3"><span className="flex items-center gap-1 text-gray-500"><I n="eye" s={13}/>{a.views}</span></td>
                    <td className="px-4 py-3">
                      <button onClick={()=>toggle(a.id,a.available)} className={`badge cursor-pointer text-xs transition-colors ${a.available?'bg-green-100 text-green-700':'bg-red-100 text-red-500'}`}>
                        {a.available?'● Disponible':'● Loué'}
                      </button>
                    </td>
                    <td className="px-4 py-3">
                      <a href={`https://supabase.com/dashboard/project/usnfmbnfailkhnpsmnqg/editor`} target="_blank" className="p-1.5 rounded-lg hover:bg-blue-50 text-blue-500 transition-colors inline-block"><I n="edit" s={14}/></a>
                    </td>
                  </tr>
                ))}
                {apartments.length===0 && <tr><td colSpan="6" className="px-4 py-12 text-center text-gray-400">Aucun bien. Ajoutez-en depuis Supabase.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   ADMIN REQUESTS
───────────────────────────────────────── */
const AdminRequests = ({ requests, updateStatus, loadRequests }) => {
  const sc = { new:{label:'Nouveau',bg:'bg-yellow-100',text:'text-yellow-700'}, contacted:{label:'Contacté',bg:'bg-blue-100',text:'text-blue-700'}, visited:{label:'Visité',bg:'bg-green-100',text:'text-green-700'} };

  return (
    <div style={{background:'#F0F4F8'}} className="min-h-screen">
      <div className="max-w-6xl mx-auto px-4 py-8">
        <div className="flex items-center justify-between mb-2">
          <h1 className="font-display text-2xl text-gray-800">Demandes de Visites</h1>
          <button onClick={loadRequests} className="flex items-center gap-2 text-sm border border-gray-300 rounded-xl px-4 py-2 text-gray-500 hover:bg-gray-100 transition-colors"><I n="refresh" s={14}/>Actualiser</button>
        </div>
        <p className="text-gray-400 text-sm mb-6">{requests.filter(r=>r.status==='new').length} nouvelle(s) demande(s)</p>

        {requests.length===0 && <div className="bg-white rounded-2xl p-16 text-center shadow-sm"><I n="calendar" s={40} c="mx-auto text-gray-300 mb-3"/><p className="text-gray-400">Aucune demande de visite pour l'instant</p></div>}

        <div className="space-y-4">
          {requests.map(r=>{
            const s = sc[r.status] || sc.new;
            return (
              <div key={r.id} className="bg-white rounded-2xl p-5 shadow-sm fade-in">
                <div className="flex flex-col md:flex-row gap-4 md:items-center">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <div className="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg flex-shrink-0" style={{background:'#C9A84C'}}>{(r.name||'?').charAt(0)}</div>
                    <div><h3 className="font-semibold text-gray-800">{r.name}</h3>{r.profession&&<p className="text-xs text-gray-400">{r.profession}</p>}</div>
                  </div>
                  <div className="flex-1 min-w-0"><p className="text-xs text-gray-400 mb-0.5">Bien souhaité</p><p className="text-sm font-medium text-gray-700 truncate">{r.apt_title}</p></div>
                  <div className="flex-none"><p className="text-xs text-gray-400 mb-0.5">Budget max</p><p className="text-sm font-medium text-gray-700">{r.budget||'—'}</p></div>
                  <div className="flex-none"><p className="text-xs text-gray-400 mb-0.5">Date souhaitée</p><p className="text-sm text-gray-700 flex items-center gap-1"><I n="calendar" s={12}/>{r.date?fmtDate(r.date):'—'}</p></div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <select value={r.status} onChange={e=>updateStatus(r.id,e.target.value)} className={`text-xs px-2.5 py-1.5 rounded-lg border-0 outline-none cursor-pointer ${s.bg} ${s.text}`}>
                      <option value="new">Nouveau</option>
                      <option value="contacted">Contacté</option>
                      <option value="visited">Visité</option>
                    </select>
                    <a href={`https://wa.me/${(r.phone||'').replace(/\s+/g,'')}`} target="_blank" className="btn-green flex items-center gap-1.5"><I n="wa" s={13}/>WA</a>
                    <a href={`tel:${r.phone}`} className="btn-primary text-xs px-3 py-2 flex items-center gap-1.5 rounded-lg"><I n="phone" s={13}/>Appeler</a>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────
   APP ROOT
───────────────────────────────────────── */
const App = () => {
  const [page, setPage] = useState('home');
  const [apt, setApt] = useState(null);
  const [apartments, setApartments] = useState([]);
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dbLive, setDbLive] = useState(false);

  /* ── Load apartments from Supabase ── */
  const loadApartments = async () => {
    try {
      const { data, error } = await sb
        .from('apartments')
        .select(`*, zones(name), apartment_images(url, display_order), apartment_amenities(amenity)`)
        .order('featured', { ascending: false })
        .order('views',    { ascending: false });
      if (error) throw error;
      if (data && data.length > 0) {
        setApartments(data.map(transformApt));
        setDbLive(true);
      } else {
        // Table exists but empty → use static demo
        setApartments(STATIC_APTS);
        setDbLive(false);
      }
    } catch (e) {
      console.warn('Supabase error, using static data:', e.message);
      setApartments(STATIC_APTS);
      setDbLive(false);
    }
  };

  /* ── Load requests from Supabase ── */
  const loadRequests = async () => {
    try {
      const { data, error } = await sb
        .from('visit_requests')
        .select(`*, apartments(title)`)
        .order('created_at', { ascending: false });
      if (!error && data && data.length > 0) {
        setRequests(data.map(transformReq));
      } else if (!error && data && data.length === 0) {
        setRequests(STATIC_REQUESTS);
      }
    } catch {
      setRequests(STATIC_REQUESTS);
    }
  };

  useEffect(() => {
    Promise.all([loadApartments(), loadRequests()]).finally(() => setLoading(false));
  }, []);

  /* ── Add request (local + Supabase via PropertyPage) ── */
  const addRequest = (req) => setRequests(prev => [req, ...prev]);

  /* ── Update request status ── */
  const updateStatus = async (id, status) => {
    setRequests(prev => prev.map(r => r.id===id ? {...r,status} : r));
    try { await sb.from('visit_requests').update({status}).eq('id', id); } catch {}
  };

  const go = (p) => {
    setPage(p);
    if (!p.startsWith('admin')) window.scrollTo({top:0,behavior:'smooth'});
  };

  /* ── Loading screen ── */
  if (loading) return (
    <div style={{minHeight:'100vh',background:'#0A1628',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div className="font-display text-4xl font-bold mb-2" style={{color:'#1E3A5F'}}>Sen.Home</div>
        <p style={{color:'rgba(255,255,255,0.35)',fontSize:'14px'}}>Chargement en cours...</p>
        <div className="spinner"></div>
      </div>
    </div>
  );

  const renderPage = () => {
    switch(page) {
      case 'home':             return <HomePage go={go} pick={setApt} apartments={apartments}/>;
      case 'properties':       return <PropertiesPage go={go} pick={setApt} apartments={apartments}/>;
      case 'property':         return <PropertyPage apt={apt} go={go} addRequest={addRequest}/>;
      case 'admin-login':      return <AdminLogin go={go}/>;
      case 'admin-dashboard':  return <AdminDashboard go={go} requests={requests} apartments={apartments} dbLive={dbLive} loadRequests={loadRequests}/>;
      case 'admin-properties': return <AdminProperties apartments={apartments} setApartments={setApartments}/>;
      case 'admin-requests':   return <AdminRequests requests={requests} updateStatus={updateStatus} loadRequests={loadRequests}/>;
      default:                 return <HomePage go={go} pick={setApt} apartments={apartments}/>;
    }
  };

  return (
    <div>
      {page !== 'admin-login' && <Navbar page={page} go={go} dbLive={dbLive}/>}
      <div key={page} className="fade-in">{renderPage()}</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
